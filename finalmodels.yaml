# Configuration for the AI workflow in Project Okavango.
# This file is read by the Streamlit app to configure the AI pipeline. [cite: 53]

vision_model:
  name: "moondream"
  prompt: "You are an environmental analyst. Describe what you see in this satellite image in detail. Focus on vegetation, land use, water bodies, urban areas, and any signs of environmental degradation such as deforestation, fires, or pollution."
  max_tokens: 500

analysis_model:
  name: "llama3.2:1b"
  prompt: |
    You are an environmental risk analyst. Based on the following satellite image description, answer these questions:
    1. Are there signs of deforestation or loss of vegetation?
    2. Is there evidence of land degradation or soil erosion?
    3. Are there signs of pollution or human environmental damage?
    4. Is this area at environmental risk overall?

    Answer with YES or NO for each question, then give a brief overall conclusion.
    Start your conclusion with either "YES, this area is at environmental risk" or "NO, this area does not appear to be at risk".

    Image description:
    {description}
  max_tokens: 300
